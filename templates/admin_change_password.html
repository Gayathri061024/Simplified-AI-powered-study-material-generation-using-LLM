<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Settings - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: #f8fafc; 
      min-height: 100vh; 
      color: #1e293b; 
      position: relative;
    }

    .navbar { 
      background: #ffffff;
      padding: 0 40px; height: 72px; display: flex; align-items: center; justify-content: space-between; 
      border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand { font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; display: flex; align-items: center; }
    .navbar-brand span { color: #2563eb; }
    .nav-badge { 
      background: #ef4444; color: #ffffff; padding: 4px 10px; 
      border-radius: 8px; font-size: 11px; margin-left: 12px; font-weight: 800; letter-spacing: 0.5px; 
    }
    
    .navbar-links { display: flex; gap: 8px; }
    .navbar-links a { 
      color: #475569; text-decoration: none; font-size: 14px; font-weight: 600; padding: 10px 18px; 
      border-radius: 8px; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px;
    }
    .navbar-links a:hover { background: #f1f5f9; color: #0f172a; }
    .navbar-links a.active { background: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; }
    
    .container { max-width: 480px; margin: 80px auto; padding: 0 20px; }
    
    .card { 
      background: #ffffff; border-radius: 16px; 
      padding: 48px; border: 1px solid #e2e8f0; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .card h3 { font-size: 24px; font-weight: 800; margin-bottom: 12px; color: #0f172a; text-align: center; letter-spacing: -1px; }
    .card p { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 32px; line-height: 1.6; }
    
    .form-group { margin-bottom: 24px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    input { 
      width: 100%; padding: 12px 16px; background: #ffffff; border: 1px solid #e2e8f0; 
      border-radius: 8px; color: #1e293b; font-size: 15px; font-family: inherit; transition: 0.2s;
    }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    
    .btn { 
      width: 100%; padding: 16px; background: #2563eb; color: #ffffff; 
      border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; 
      transition: 0.2s; margin-top: 10px;
    }
    .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
    
    .success { 
      background: #f0fdf4; color: #166534; padding: 16px; border-radius: 8px; 
      font-size: 14px; margin-bottom: 32px; text-align: center; font-weight: 600; 
      border: 1px solid #dcfce7; 
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='light-theme.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">📚 Study<span>Material</span> <span class="nav-badge">ADMIN</span></div>
  <div class="navbar-links">
    <a href="/admin"><span>🏠</span> Dashboard</a>
    <a href="/admin/students"><span>👥</span> Students</a>
    <a href="/admin/history"><span>📋</span> History</a>
    <a href="/admin/upload"><span>📤</span> Upload</a>
    <a href="/admin/change_password" class="active"><span>🔐</span> Security</a>
    <a href="/admin/logout"><span>🚪</span> Logout</a>
  </div>
</nav>

<div class="container">
  <div class="card">
    <h3>🔐 Security Command</h3>
    <p>Define a new high-entropy master password to secure the administrative gateway.</p>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="success">✨ {{ messages[0] }}</div>{% endif %}
    {% endwith %}
    
    <form method="POST">
      <div class="form-group">
        <label>New Administrative Secret</label>
        <input type="password" name="new_password" placeholder="••••••••••••" required>
      </div>
      <button class="btn" type="submit">Refresh Credentials →</button>
    </form>
  </div>
</div>
</body>
</html>
