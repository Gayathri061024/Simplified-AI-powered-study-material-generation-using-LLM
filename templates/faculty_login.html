<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: #1e293b;
    }



    .card {
      background: #ffffff;
      padding: 56px;
      border-radius: 24px;
      width: 100%;
      max-width: 480px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 32px;
      color: #182230;
      font-weight: 800;
      letter-spacing: -1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .logo h1 span {
      background: linear-gradient(135deg, #10b981, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: #5f6f86;
      font-size: 15px;
      margin-top: 12px;
      font-weight: 500;
    }

    .badge {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #ffffff;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #0f172a;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #10b981;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .btn:hover {
      background: #059669;
    }

    .footer-links {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      font-size: 14px;
    }

    .footer-links a {
      color: #6b7c93;
      text-decoration: none;
      transition: 0.2s;
    }

    .footer-links a:hover {
      color: #10b981;
    }

    .alert {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      border: 1px solid rgba(239, 68, 68, 0.2);
      text-align: center;
    }

    @media (max-width: 480px) {
      .card {
        padding: 40px 24px;
      }
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='light-theme.css') }}">
</head>

<body>
  <div class="card">
    <div class="logo">
      <h1>📚 Study<span>Material</span></h1>
      <p>Faculty Access Portal</p>
      <div style="margin-top: 16px;"><span class="badge">FACULTY</span></div>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="alert">⚠️ {{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <div class="input-container">
          <input type="text" name="username" placeholder="Enter faculty username" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-container">
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn">Sign In to Dashboard</button>
    </form>

    <div class="footer-links">
      <a href="/">← Student Portal</a>
      <a href="/admin/login">Admin Portal →</a>
    </div>
  </div>
</body>

</html>
