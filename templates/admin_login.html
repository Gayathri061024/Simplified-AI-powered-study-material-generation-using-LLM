<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: #f8fafc; 
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        position: relative; 
        color: #1e293b;
    }

    .card { 
        background: #ffffff; 
        padding: 56px; 
        border-radius: 24px; 
        width: 100%; 
        max-width: 480px; 
        border: 1px solid #e2e8f0; 
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); 
        position: relative;
    }
    
    .logo { text-align: center; margin-bottom: 40px; }
    .logo h1 { 
        font-size: 32px; 
        color: #0f172a; 
        font-weight: 800; 
        letter-spacing: -1px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 12px; 
    }
    .logo h1 span {
        color: #2563eb;
    }
    .logo p { color: #64748b; font-size: 15px; margin-top: 12px; font-weight: 500; }
    
    .badge { 
        background: #ef4444; 
        color: #ffffff; 
        padding: 4px 12px; 
        border-radius: 8px; 
        font-size: 11px; 
        font-weight: 800;
        letter-spacing: 0.5px; 
    }
    
    .form-group { margin-bottom: 24px; }
    label { 
        display: block; 
        font-size: 12px; 
        font-weight: 700; 
        color: #6366f1; 
        margin-bottom: 10px; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
    }
    input { 
        width: 100%; 
        padding: 12px 16px; 
        border: 1px solid #e2e8f0; 
        border-radius: 8px; 
        font-size: 15px; 
        color: #1e293b; 
        background: #ffffff; 
        transition: all 0.2s; 
        font-family: inherit; 
    }
    input:focus { 
        outline: none; 
        border-color: #3b82f6; 
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
    }
    
    .btn { 
        width: 100%; 
        padding: 14px; 
        background: #2563eb; 
        color: #ffffff; 
        border: none; 
        border-radius: 8px; 
        font-size: 15px; 
        font-weight: 700; 
        cursor: pointer; 
        transition: all 0.2s; 
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .btn:hover { 
        background: #1d4ed8; 
    }
    
    .error { 
        background: #fef2f2; 
        color: #991b1b; 
        padding: 14px; 
        border-radius: 8px; 
        font-size: 14px; 
        margin-bottom: 24px; 
        border: 1px solid #fee2e2; 
        font-weight: 600; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
    }
    
    .back { text-align: center; margin-top: 32px; font-size: 14px; font-weight: 600; }
    .back a { color: #64748b; text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .back a:hover { color: #2563eb; }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='light-theme.css') }}">
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>📚 Study<span>Material</span> <span class="badge">ADMIN</span></h1>
    <p>Administrator Access Portal</p>
  </div>
  
  {% with messages = get_flashed_messages() %}
    {% if messages %}<div class="error">⚠️ {{ messages[0] }}</div>{% endif %}
  {% endwith %}
  
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter Username" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter Password" required>
    </div>
    <button class="btn" type="submit">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      Secure Login
    </button>
  </form>
  
  <div class="back"><a href="/login">← Back to Student Login</a></div>
</div>
</body>
</html>
